network:
  grpc:
    host: "0.0.0.0"
    port: 50051

strategies:
  - id: "ibkr_strategy_1"
    account_id: "ibkr_account_123"
    gateway: "grpc_adapter"
    adapter:
      venue: "paper"
      binary: "python_client/adapters/adapter.py"
      credentials: "config/ibkr_creds.yaml"
      port: 50100 # must be unique per (venue, account) on this host
    database:
      journal: "trading_journal"
      orders:  "trading_orders"
    market_data:
      feed: "ibkr" # must match adapter.venue
      subscriptions:
        - symbol: "AAPL"
          period: "1m"
    test:
      symbol: "PLTR"
      iterations: 300
      wait_secs: 3.0
      flatten: true
      orders:
        - {side: BUY,  qty: 2.0}
        - {side: BUY,  qty: 1.0}
        - {side: BUY,  qty: 3.0}
  - id: "simple_test_strategy_1"
    account_id: "name_id0"
    gateway: "paper trading" # or "alpaca"
    database:
      journal: "trading_journal"
      orders: "trading_orders"
    # Market data streams coming
    market_data:
      feed: "simulated"
      subscriptions:
        - symbol: "ACDC"
          period: "1s"
    # Python client test scenario (ignored by the C++ engine)
    test:
      symbol: "ACDC"
      iterations: 30
      wait_secs: 3.0
      flatten: true
      orders:
        - {side: BUY,  qty: 2.0}
        - {side: BUY,  qty: 1.0}
